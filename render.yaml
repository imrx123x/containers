services:
  - type: web
    name: flask-users-app
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt -r requirements-dev.txt
    preDeployCommand: python -V && ls && ls migrations && ls migrations/versions && alembic stamp 0001_baseline_full_schema
    startCommand: gunicorn -b 0.0.0.0:$PORT run:app
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true